name: Deploy docs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build static docs
        run: yarn tiny-docs -c configs.yaml publish dist

      - name: Rewrite hidden routes for GitHub Pages
        run: |
          [ ! -d dist/.agents ] || cp -a dist/.agents dist/agents
          [ ! -d dist/llms/.agents ] || cp -a dist/llms/.agents dist/llms/agents
          [ ! -d dist/static/.agents ] || cp -a dist/static/.agents dist/static/agents
          find dist \( -name '*.html' -o -name '*.md' -o -name '*.txt' \) -type f -exec sed -i \
            -e 's#/LayaAir-Docs/.agents/#/LayaAir-Docs/agents/#g' \
            -e 's#./llms/.agents/#./llms/agents/#g' \
            -e 's#llms/.agents/#llms/agents/#g' \
            -e 's#static/.agents/#static/agents/#g' \
            {} +

      - name: Disable Jekyll processing
        run: touch dist/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
