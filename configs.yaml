DocsModule:
  assetsDirs:
    - node_modules/@tinyaxis/tiny-docs/assets
    - ./assets
  copyright: © 2026 Geequlim. All rights reserved.
  env: development
  logo: /assets/layabox-logo.svg
  navigator:
    buttons:
      - match: equals
        title: 首页
        url: /
      - match: startsWith
        prefix: /
        title: 文档
        url: /getting-started
  pages:
    - data:
        heading: LayaAir 文档
        features:
          - description: 先把概念、流程、边界条件和对象关系写成结构化 Markdown，让 Agent 能稳定读取和推理。
            mark: 01
            title: Agent 优先组织
          - description: 将图片、动图和视频中的操作信息补充为可搜索、可引用、可维护的 Markdown 文档。
            mark: 02
            title: 用文字补足逻辑
          - description: 对流程、层级、资源关系和运行机制补充 draw.io 等结构化图表，再渲染成人类方便阅读的页面。
            mark: 03
            title: 图表表达结构
        kicker: LayaAir Documentation
        lead: 官方资料已经覆盖了大量 LayaAir 使用场景。本项目在此基础上补充更适合检索、引用和 Agent 理解的结构化说明，将图片、动图和视频中的操作信息整理为 Markdown、LLM 入口和图表，再渲染成人类方便阅读的文档站。
        metrics:
          - label: 文档版本
            value: 3.x
          - label: 内容语言
            value: ZH
          - label: 发布目标
            value: Pages
        paths:
          - description: 了解标准 LayaAir 项目的结构、启动方式和核心对象关系。
            href: getting-started
            index: 01
            title: 开始阅读
          - description: 从运行时基础、场景预制体到 2D/3D 开发，按章节系统学习。
            href: runtime-foundation
            index: 02
            title: 运行时与开发
          - description: 对照官方中文文档，查看原始资料和引擎源码。
            externalUrl: https://github.com/layabox/LayaAir-Doc-ZH/tree/LayaAir3.4
            index: 03
            title: 官方资料
        referenceUrl: https://github.com/layabox/LayaAir-Doc-ZH/tree/LayaAir3.4
        version: LayaAir 3.4
      path: ''
      shell:
        breadcrumbs: false
        footerNoMargin: true
        sidebar: false
      template: ./views/home.hbs
      title: 首页
  publish:
    brokenLinks:
      action: warn
    llm:
      enabled: true
      includeFrontmatter: true
      mermaid:
        output: source
    routePrefix: /LayaAir-Docs/
  routePrefix: /LayaAir-Docs/
  search:
    emptyText: 没有找到相关文档
    enabled: true
    errorText: 搜索暂时不可用，请稍后重试
    initialText: 输入 LayaAir、组件、资源、脚本、生命周期等关键词开始搜索
    placeholder: 搜索 LayaAir 文档
    searchingText: 正在搜索...
    shortcut: Ctrl K
  showLineNumbers: false
  spaces:
    - dirs:
        - linkPrefix: ''
          path: docs
          title: LayaAir 文档
      title: LayaAir 文档
    - dirs:
        - linkPrefix: ''
          path: writing-plan
          title: 写作规划
      order: 200
      title: 写作规划
    - agentSkillNoOrphanDirs: true
      dirs:
        - linkPrefix: agents/skills
          path: .agents/skills
          title: skills
      noOrphanDirs: true
      order: 100
      title: Agent
      useOrphanDocsAsDirs: true
  tagline: 在官方资料基础上补充可读、可搜、适合 Agent 使用的结构化 Markdown 文档
  title: LayaAir 文档
  workspace: .
TinyDocsDatabaseModule:
  logger:
    migration: true
    query: false
    schema: false
