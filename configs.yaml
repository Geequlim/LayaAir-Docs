DocsModule:
  assetsDirs:
    - node_modules/@tinyaxis/tiny-docs/assets
    - ./assets
  copyright: © 2026 Geequlim. All rights reserved.
  env: development
  logo: /assets/icons/layaair.png
  navigator:
    buttons:
      - match: equals
        title: 首页
        url: /
      - match: startsWith
        prefix: /
        title: 文档
        url: /getting-started
  pages:
    - data:
        features:
          - description: 集成丰富的开发工具，提供开箱即用的解决方案。
            image: /assets/dev/docs/img/icons8-app-development.svg
            title: 功能丰富
          - description: 自由组合所需服务，专注于业务功能的开发。
            image: /assets/dev/docs/img/icons8-dependencies.svg
            title: 模块化开发
          - description: 采用标准化的开发范式，提升团队协作效率。
            image: /assets/dev/docs/img/icons8-correction.svg
            title: 统一规范
      path: ''
      shell:
        breadcrumbs: false
        footerNoMargin: true
        sidebar: false
      template: '@docs/pages/index.hbs'
      title: 首页
  publish:
    brokenLinks:
      action: warn
    llm:
      enabled: true
      includeFrontmatter: true
      mermaid:
        output: source
    routePrefix: /LayaAir-Docs/
  remaps:
    AGENTS:
      order: -1
      space: Agent
      target: AGENTS.md
      title: AGENTS.md
    getting-started:
      order: -1
      space: 开发文档
      target: README
      title: 快速开始
  routePrefix: /LayaAir-Docs/
  search:
    emptyText: 没有找到相关结果
    enabled: true
    errorText: 搜索暂时不可用，请稍后重试
    initialText: 输入关键词开始搜索
    placeholder: 搜索文档
    searchingText: 正在搜索...
    shortcut: Ctrl K
  showLineNumbers: false
  spaces:
    - dirs:
        - linkPrefix: ''
          path: docs
          title: 快速开始
      title: 开发文档
    - agentSkillNoOrphanDirs: true
      dirs:
        - path: .agents/skills
          title: skills
      noOrphanDirs: true
      order: 100
      title: Agent
      useOrphanDocsAsDirs: true
  tagline: 文科生视角撰写的技术文档
  title: LayaAir
  workspace: .
TinyDocsDatabaseModule:
  logger:
    migration: true
    query: false
    schema: false
